name: agent-release

# Builds the dawn-agent CLI for macOS (universal), Windows (x64), and Linux (x64)
# on native runners, packages each with a run README, uploads them as workflow
# artifacts, and (on an `agent-v*` tag) attaches them to a GitHub Release.
#
# Unsigned early-access builds. The public website serves them from the host
# (the repo ⇒ release assets aren't anonymously downloadable), so after a run
# the artifacts are pulled and hosted under a TLS reverse proxy /downloads.

on:
  workflow_dispatch:
  push:
    tags: ["agent-v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            name: dawn-agent-macos-universal
            archive: tar.gz
          - os: ubuntu-latest
            name: dawn-agent-linux-x64
            archive: tar.gz
          - os: windows-latest
            name: dawn-agent-windows-x64
            archive: zip
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: apps/agent
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Build (macOS universal)
        if: matrix.os == 'macos-14'
        run: |
          rustup target add aarch64-apple-darwin x86_64-apple-darwin
          cargo build --release --features onchain --bin dawn-agent --target aarch64-apple-darwin
          cargo build --release --features onchain --bin dawn-agent --target x86_64-apple-darwin
          mkdir -p dist
          lipo -create -output dist/dawn-agent \
            target/aarch64-apple-darwin/release/dawn-agent \
            target/x86_64-apple-darwin/release/dawn-agent
          strip dist/dawn-agent

      - name: Build (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cargo build --release --features onchain --bin dawn-agent
          mkdir -p dist
          cp target/release/dawn-agent dist/dawn-agent
          strip dist/dawn-agent

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          cargo build --release --features onchain --bin dawn-agent
          mkdir -p dist
          cp target/release/dawn-agent.exe dist/dawn-agent.exe

      - name: Bundle README
        shell: bash
        run: |
          cat > dist/README.txt <<'EOF'
          Dawn Agent — early access (CLI)
          ================================
          Earn USDC by letting your machine run sandboxed micro-jobs, settled on Base.

          Run it:
            DAWN_NODE_KEY=0x<your-base-private-key> \
            DAWN_BACKEND_WS=wss://ws.dawnonbase.cc/agent \
            DAWN_SETTLEMENT=0xc27C681cE93a63C0987226CDaC7b66232018651E \
            DAWN_RPC_URL=<your-base-mainnet-rpc-url> \
            DAWN_CHAIN_ID=8453 \
            ./dawn-agent

          Notes:
          - Fund the node address with a little Base ETH (it pays its own settle gas).
          - Payouts (USDC) go to the node address.
          - macOS/Windows: unsigned build. macOS: right-click the binary > Open the
            first time (or `xattr -dr com.apple.quarantine ./dawn-agent`).
          - Prefer an encrypted key: `./dawn-agent keystore import <keyfile>`.
          EOF

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: cd dist && tar czf "../${{ matrix.name }}.tar.gz" *

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: bash
        run: cd dist && 7z a "../${{ matrix.name }}.zip" * >/dev/null

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: apps/agent/${{ matrix.name }}.${{ matrix.archive }}
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: apps/agent/${{ matrix.name }}.${{ matrix.archive }}
